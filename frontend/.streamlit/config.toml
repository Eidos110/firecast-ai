# FireCast Streamlit Configuration - Production (Streamlit 1.57.0-compatible)

[theme]
primaryColor              = "#ef4444"
backgroundColor           = "#0f172a"
secondaryBackgroundColor  = "#1e293b"
textColor                 = "#f1f5f9"
font                      = "sans serif"

[server]
address                  = "0.0.0.0"
port                     = 8501
enableCORS               = true
enableXsrfProtection     = true

[browser]
gatherUsageStats         = false
