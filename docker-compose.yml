# FireCast Docker Compose Configuration
# =============================================================================
# Services:
#   frontend  - Streamlit UI (firecast-frontend target)
#   api       - FastAPI backend
#   dev       - Combined local dev environment with live code mounts
#   nginx     - Reverse proxy + SSL (production profile only)
#
# Usage:
#   docker-compose up -d              # frontend + api
#   docker-compose up -d frontend     # frontend only
#   docker-compose up -d api          # api only
#   docker-compose up -d dev          # dev (code hot-mount)
#   docker-compose --profile production up -d  # all incl. nginx
# =============================================================================

version: "3.8"

services:
  # ── Frontend (Streamlit) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    container_name: firecast-frontend
    ports:
      - "8501:8501"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - ENABLE_DEMO_MODE=false
      - API_BASE_URL=http://api:8000
    env_file:
      - .env
    volumes:
      # Mount models read-only so updates on host are reflected without rebuild
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - firecast

  # ── API (FastAPI) ────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    container_name: firecast-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENABLE_DEMO_MODE=false
      - ML_DEVICE=cpu
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - firecast

  # ── Development (Frontend + API with live code mounts) ──────────────────
  dev:
    build:
      context: .
      target: development
    container_name: firecast-dev
    ports:
      - "8501:8501"
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    volumes:
      # Mount the full project tree for live code editing + hot-reload
      - ./:/app
      # Exclude node_modules / venv from host mounts to avoid conflicts
      - /app/venv
      - /app/frontend_react/node_modules
    command: python launch_prototype.py --mode both
    restart: "no"
    networks:
      - firecast

  # ── Nginx Reverse Proxy (production profile) ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: firecast-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/www:/var/www/html:ro
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    networks:
      - firecast
    profiles:
      - production

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  firecast:
    driver: bridge

# ── Volumes (optional persistent data) ───────────────────────────────────
volumes:
  firecast-models:
