# FireCast Nginx Configuration
# Reverse proxy for Streamlit (frontend) + FastAPI (backend)
# =============================================================================
# Place your SSL certificate and key in nginx/ssl/
# Self-signed (testing):
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/ssl/firecast.key -out nginx/ssl/firecast.crt
# =============================================================================

upstream firecast_frontend {
    server frontend:8501;
}

upstream firecast_api {
    server api:8000;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Uncomment and set your domain when deploying publicly
    # server_name firecast.yourdomain.com;

    # Let's Encrypt challenge path (optional — configure certbot first)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;
}

# ── HTTPS endpoint ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # Uncomment and set your domain when deploying publicly
    # server_name firecast.yourdomain.com;

    # ── SSL certificates ────────────────────────────────────────────────
    # Generate with: openssl req -x509 ... (see comment above)
    # Or use Let's Encrypt: certbot --nginx -d firecast.yourdomain.com
    ssl_certificate     /etc/nginx/ssl/firecast.crt;
    ssl_certificate_key /etc/nginx/ssl/firecast.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend (Streamlit) ─────────────────────────────────────────────
    location / {
        proxy_pass http://firecast_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                300s;
        proxy_connect_timeout              75s;
    }

    # ── API endpoints ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://firecast_api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API docs / OpenAPI ───────────────────────────────────────────────
    location /docs {
        proxy_pass http://firecast_api/docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── API health check ────────────────────────────────────────────────
    location /health {
        proxy_pass http://firecast_api/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    # ── Static assets ──────────────────────────────────────────────────
    location /static/ {
        proxy_pass http://firecast_frontend/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
